log_format tieng_viet
    '[$time_local] request="$request" trạng_thái=$status '
    'dữ_liệu_gửi=$body_bytes_sent thời_gian=${request_time}s '
    'địa_chỉ=$remote_addr trình_duyệt="$http_user_agent"';

access_log /dev/stdout tieng_viet;
error_log /dev/stderr warn;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "frontend ok\n";
    }

    # Giao diện được cập nhật thường xuyên trong giai đoạn phát triển.
    # Không cache HTML/JavaScript để trình duyệt luôn nhận đúng phiên bản mới.
    location ~* \.(?:html|js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
