<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Brain Tumor Detection AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Brain Tumor AI</h1>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.875rem;">Đăng nhập hệ thống chẩn đoán</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="identifier" class="form-label">Tên đăng nhập hoặc Email</label>
                    <input type="text" id="identifier" class="form-control" required placeholder="Nhập tài khoản">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" required placeholder="Nhập mật khẩu">
                </div>
                
                <div id="login-error" class="text-error mb-1 hidden text-center" style="font-size: 0.875rem;"></div>
                
                <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Đăng nhập</button>
            </form>
            
            <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1rem; font-size: 0.75rem; color: var(--text-secondary); text-align: center;">
                <p>Tài khoản mẫu: admin / Admin@123456</p>
                <p>Tài khoản mẫu: doctor01 / Doctor@123456</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
