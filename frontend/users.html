<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tài khoản - Brain Tumor Detection AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Brain Tumor AI</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Tổng quan</a>
                <a href="patients.html" class="nav-item">Quản lý Bệnh nhân</a>
                <a href="prediction.html" class="nav-item">Dự đoán MRI</a>
                <a href="history.html" class="nav-item">Lịch sử Dự đoán</a>
                <a href="users.html" class="nav-item active admin-only">Quản lý Tài khoản</a>
                <a href="audit-logs.html" class="nav-item admin-only hidden">Nhật ký Hệ thống (Audit Logs)</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div id="user-fullname" style="font-weight: 500; color: var(--text-primary);">Đang tải...</div>
                    <div id="user-role" class="user-role">Đang tải...</div>
                </div>
                <button id="logout-btn" class="btn btn-outline" style="width: 100%; font-size: 0.75rem;">Đăng xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h3>Quản lý Tài khoản (Admin)</h3>
            </header>
            
            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Danh sách Tài khoản</h2>
                    <button id="btn-add-user" class="btn btn-primary">+ Tạo Tài khoản mới</button>
                </div>
                
                <div class="card">
                    <div class="card-body" style="padding: 0;">
                        <div class="table-container">
                            <table id="users-table">
                                <thead>
                                    <tr>
                                        <th>Tên đăng nhập</th>
                                        <th>Email</th>
                                        <th>Vai trò</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td colspan="5" class="text-center">Đang tải dữ liệu...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="user-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Tạo Tài khoản mới</h3>
                <button class="modal-close" id="btn-close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="user-form">
                    <div class="form-group">
                        <label class="form-label" for="username">Tên đăng nhập</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="role">Vai trò</label>
                        <select id="role" class="form-control" required style="background-color: var(--bg-color);">
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    
                    <div id="form-error" class="text-error hidden mb-1" style="font-size: 0.875rem;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="btn-cancel">Hủy</button>
                <button class="btn btn-primary" id="btn-save">Tạo tài khoản</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
