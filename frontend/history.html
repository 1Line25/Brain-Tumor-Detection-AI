<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử Dự đoán - Brain Tumor Detection AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; align-items: center; gap: 10px;">
                <img src="img/uet_logo.png" alt="UET Logo" style="height: 36px; width: auto; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.2);" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg width=\'40\' height=\'40\' viewBox=\'0 0 40 40\' xmlns=\'http://www.w3.org/2000/svg\'><circle cx=\'20\' cy=\'20\' r=\'20\' fill=\'%230077b6\'/><text x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dominant-baseline=\'central\' font-family=\'Arial, sans-serif\' font-weight=\'bold\' font-size=\'14\' fill=\'white\'>UET</text></svg>'">
                <h2 style="font-size: 1.1rem; line-height: 1.2; margin: 0;">Brain Tumor AI</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Tổng quan</a>
                <a href="patients.html" class="nav-item">Quản lý Bệnh nhân</a>
                <a href="prediction.html" class="nav-item">Dự đoán MRI</a>
                <a href="history.html" class="nav-item active">Lịch sử Dự đoán</a>
                <a href="users.html" class="nav-item admin-only hidden">Quản lý Tài khoản</a>
                <a href="audit-logs.html" class="nav-item admin-only hidden">Nhật ký Hệ thống (Audit Logs)</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div id="user-fullname" style="font-weight: 500; color: var(--text-primary);">Đang tải...</div>
                    <div id="user-role" class="user-role">Đang tải...</div>
                </div>
                <button id="logout-btn" class="btn btn-outline" style="width: 100%; font-size: 0.75rem;">Đăng xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h3>Lịch sử Chẩn đoán</h3>
            </header>
            
            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Lịch sử Chẩn đoán MRI</h2>
                    <button id="btn-cleanup" class="btn btn-danger admin-only hidden">Xóa file hết hạn</button>
                </div>
                
                <div class="card">
                    <div class="card-body" style="padding: 0;">
                        <div class="table-container">
                            <table id="history-table">
                                <thead>
                                    <tr>
                                        <th>Ngày giờ</th>
                                        <th>Bệnh nhân</th>
                                        <th>Bác sĩ</th>
                                        <th>Loại u</th>
                                        <th>Độ tin cậy</th>
                                        <th>Tình trạng ảnh</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td colspan="6" class="text-center">Đang tải dữ liệu...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
