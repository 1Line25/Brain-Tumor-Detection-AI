<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật ký Hệ thống - Brain Tumor Detection AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Brain Tumor AI</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Tổng quan</a>
                <a href="patients.html" class="nav-item">Quản lý Bệnh nhân</a>
                <a href="prediction.html" class="nav-item">Dự đoán MRI</a>
                <a href="history.html" class="nav-item">Lịch sử Dự đoán</a>
                <a href="users.html" class="nav-item admin-only">Quản lý Tài khoản</a>
                <a href="audit-logs.html" class="nav-item active admin-only">Nhật ký Hệ thống (Audit Logs)</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div id="user-fullname" style="font-weight: 500; color: var(--text-primary);">Đang tải...</div>
                    <div id="user-role" class="user-role">Đang tải...</div>
                </div>
                <button id="logout-btn" class="btn btn-outline" style="width: 100%; font-size: 0.75rem;">Đăng xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h3>Nhật ký Hệ thống (Admin)</h3>
            </header>
            
            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Lịch sử Thao tác</h2>
                </div>
                
                <div class="card">
                    <div class="card-body" style="padding: 0;">
                        <div class="table-container">
                            <table id="audit-table">
                                <thead>
                                    <tr>
                                        <th>Thời gian</th>
                                        <th>Người thực hiện</th>
                                        <th>Hành động</th>
                                        <th>Đối tượng</th>
                                        <th>IP</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td colspan="5" class="text-center">Đang tải dữ liệu...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/audit-logs.js"></script>
</body>
</html>
