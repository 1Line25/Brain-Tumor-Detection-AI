services:
  postgres:
    image: postgres:16-alpine
    container_name: brain_tumor_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Lưu dữ liệu PostgreSQL để restart container không làm mất database.
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  database-init:
    image: postgres:16-alpine
    container_name: brain_tumor_database_init
    restart: "no"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-admin123}
      PGDATABASE: ${POSTGRES_DB:-mydatabase}
      PGOPTIONS: -c client_min_messages=warning

    volumes:
      - ./backend/database:/database:ro

    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[DATABASE] Bắt đầu kiểm tra và khởi tạo schema..."
        psql --quiet -v ON_ERROR_STOP=1 -f /database/schema.sql
        echo "[DATABASE] Bắt đầu nạp dữ liệu mẫu..."
        psql --quiet -v ON_ERROR_STOP=1 -f /database/seed.sql
        echo "[DATABASE] Khởi tạo database hoàn tất."

  backend:
    build:
      context: .
      dockerfile: backend/dockerfile

    container_name: brain_tumor_backend
    restart: unless-stopped

    depends_on:
      database-init:
        condition: service_completed_successfully

    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-mydatabase}
      SECRET_KEY: ${SECRET_KEY:-development-only-change-this-secret-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      LOGIN_MAX_FAILED_ATTEMPTS: ${LOGIN_MAX_FAILED_ATTEMPTS:-5}
      LOGIN_IP_MAX_FAILED_ATTEMPTS: ${LOGIN_IP_MAX_FAILED_ATTEMPTS:-20}
      LOGIN_ATTEMPT_WINDOW_MINUTES: ${LOGIN_ATTEMPT_WINDOW_MINUTES:-15}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_TO_FILE: ${LOG_TO_FILE:-false}

    ports:
      - "${BACKEND_PORT:-8000}:8000"

    volumes:
      # Giữ ảnh MRI và Grad-CAM khi restart backend.
      - ./storage:/app/storage

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/health', timeout=5)); raise SystemExit(0 if data.get('status') == 'ok' else 1)"
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: brain_tumor_frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT:-8080}:80"

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
